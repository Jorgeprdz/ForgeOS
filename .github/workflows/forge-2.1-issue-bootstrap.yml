name: Forge 2.1 Scheduled Bootstrap

on:
  schedule:
    - cron: '*/5 * * * *'
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

concurrency:
  group: forge-2.1-bootstrap
  cancel-in-progress: false

jobs:
  rebuild:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' &&
       github.event.issue.title == 'FORGE_2_1_BOOTSTRAP' &&
       github.event.issue.user.login == 'Jorgeprdz')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: rewrite/forge-2.1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Skip when Forge 2.1 is already materialized
        id: guard
        shell: bash
        run: |
          if [[ -f forge/modules.json && ! -f tools/bootstrap-forge-2.1.sh ]]; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Rebuild Forge OS 2.1
        if: steps.guard.outputs.skip != 'true'
        run: bash tools/bootstrap-forge-2.1.sh
      - name: Close trigger issue
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --comment "Forge OS 2.1 bootstrap completed."
