name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase.yml"

jobs:
  deploy-semantic-extract:
    runs-on: ubuntu-latest

    env:
      SUPABASE_PROJECT_REF: rgcolnioakzrdtsxwscp

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy semantic-extract
        run: supabase functions deploy semantic-extract --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test semantic-extract
        run: |
          curl --max-time 30 -s -L -X POST \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/semantic-extract" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"note":"Pidió 6 cotizaciones para el martes"}' \
            | tee response.json

          cat response.json

          grep -q "semantic-extract-v0.6" response.json
